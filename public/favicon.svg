<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Marca STRONILEAD — símbolo "The Surge": três chevrons ascendentes
       (funil → conversão → matrícula). Versão sobre fundo escuro: chevrons
       brancos, topo em accent laranja = resultado. Cores da marca:
       ink-900 #0E1A40, accent-500 #FF6A2B. -->
  <rect width="48" height="48" rx="11" fill="#0E1A40"/>
  <g transform="translate(0 -2.5)" stroke-linecap="round" stroke-linejoin="round" stroke-width="4.4">
    <path d="M11 39 L24 29 L37 39" stroke="#FFFFFF"/>
    <path d="M13.5 30 L24 21.5 L34.5 30" stroke="#FFFFFF"/>
    <path d="M16 21 L24 14 L32 21" stroke="#FF6A2B"/>
  </g>
</svg>
