# CI do Stronilead (crm-stronix): roda em todo PR para a main e em push na main.
# Trava regressão de lint, testes e build antes do merge. A publicação das
# firestore.rules segue manual (fora do escopo deste workflow).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Ao chegar commit novo no mesmo ref, cancela a execução anterior (economiza minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Testes · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instala dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm run test

      - name: Build
        run: npm run build
